<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Fullscreen GIF</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      border: 0;
      overflow: hidden;
    }

    body, html {
      width: 100%;
      height: 100%;
      background: #000;
    }

    img {
      width: 100vw;
      height: 100vh;
      object-fit: cover;      /* заполняет весь экран, обрезая края если нужно */
      /* object-fit: contain; */   /* если хочешь видеть всю гифку целиком */
      display: block;
    }
  </style>
</head>
<body>

  <img src="ezgif-34b6000eb4f09b6f.gif" alt="fullscreen animation">

</body>
</html>
